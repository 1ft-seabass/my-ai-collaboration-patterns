title = "Gitleaks config"

# gitleaks のデフォルト検出ルールを継承する（これが無いと [allowlist] しか
# 定義されず、検出ルール 0 個の設定として動作してしまう）
[extend]
useDefault = true

[allowlist]
paths = [
  '''node_modules/.*''',
  '''dist/.*''',
]

regexes = [
  '''YOUR_TOKEN_HERE''',
  '''your_api_key_here''',
  '''YOUR_API_KEY''',
  '''XXXXXXXX''',
]
